<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCFS Scheduling</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
        }
        body {
            display: flex;
            flex-direction: column;
            
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 2px -2px gray;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
        }
        .form-container, .results-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 100%;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .card-placeholder {
            width: 100%;
            background-color: #e0e0e0;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .results-container{
            background-color: #e0e0e0; 
            color: #333;
            box-shadow: 0 4px 2px -2px gray;
        }
        input[type="number"] {
            padding: 10px;
            margin: 10px;
            width: 100%;
            max-width: 300px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size:14px;
        }
        .process-input{
            display:flex;
            flex-wrap: wrap;
            justify-content:space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .process-label {
            font-size:16px;
            width:100%;
            margin-bottom: 5px;
            text-align:left;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin: 10px auto;
        }

        button:hover {
            background-color: #45a049;
        }

        h1, h2 {
            color: #333;
            margin-bottom: 20px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            padding: 10px;
            background-color: #f8f9fa;
            margin: 5px 0;
            border-radius: 5px;
        }
         
        
        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: white;
            width: 100%;
        }
        /* Responsive design for smaller screens */
        @media screen and (max-width: 768px) {
            .form-container, .results-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>


  <header>
    OPERATING SYSTEM PROJECT - FCFS SCHEDULING
  </header>

  <div class="container">
    
    <div class="form-container">
      <h1>FCFS Scheduling</h1>

      <div class="card-placeholder">
      <form id="processForm">
        <input type="number" id="numProcesses" placeholder="Enter number of processes" required>
        <button type="submit">Submit</button>
      </form>

      <div id="processInputs"></div>
      <button id="calculateBtn" style="display: none;">Calculate FCFS</button>
    </div>

    
      <p>Process details and results will be displayed here.</p>
    </div>

    <div class="form-container">
    <div class="results-container">
      <h2>Results</h2>
      <ul id="resultsList"></ul>

      <div id="ganttChart"></div>

      <div id="readyQueue"></div>
    </div>
</div>
<button id="backButton" style="display: none;">Back</button>
</div>

  <footer>
    &copy; 2024 Operating System | All rights reserved.
  </footer>

  <script src="script.js"></script>
</body>
</html>
